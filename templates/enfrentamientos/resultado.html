{% extends 'base.html' %}
{% block title %}Registrar Resultado — Arena-Match{% endblock %}
{% block content %}

<div class="page-header">
    <h1>⚔ Registrar Resultado</h1>
    <a href="{{ url_for('enfrentamientos') }}" class="btn">← Volver</a>
</div>

<div class="section-card form-card">
    <div class="match-display">
        <div class="team-box">{{ enf.NomE1 }}</div>
        <div class="vs-label">VS</div>
        <div class="team-box">{{ enf.NomE2 }}</div>
    </div>

    <form method="POST">
        <div class="form-group">
            <label>Equipo Ganador *</label>
            <select name="ganador" required>
                <option value="">— Seleccionar ganador —</option>
                <option value="{{ enf.IDEquipo1 }}">{{ enf.NomE1 }}</option>
                <option value="{{ enf.IDEquipo2 }}">{{ enf.NomE2 }}</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Confirmar Resultado</button>
        </div>
    </form>
</div>
{% endblock %}
