{% extends "base.html" %}
{% block title %}Error — Arena Match{% endblock %}

{% block content %}
<div class="empty-state" style="padding:6rem 2rem;">
  <div class="empty-state-icon">⚠</div>
  <h2 style="font-family:'Rajdhani',sans-serif; font-size:1.5rem; color:var(--accent-orange); margin-bottom:0.75rem; text-transform:uppercase; letter-spacing:1px;">
    Error del servidor
  </h2>
  <p style="color:var(--text-secondary); max-width:480px; margin:0 auto 1.5rem;">
    {{ error }}
  </p>
  <a href="{{ url_for('index') }}" class="btn btn-primary">← Volver al Dashboard</a>
</div>
{% endblock %}
